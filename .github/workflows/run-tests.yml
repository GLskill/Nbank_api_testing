name: Run tests

on: [push, workflow_dispatch]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps

      - name: Start services
        run: |
          docker compose -f infra/docker_compose/docker-compose.yml up -d backend frontend
          sleep 30

      - name: Check services
        run: |
          docker ps
          docker compose -f infra/docker_compose/docker-compose.yml logs backend
          docker compose -f infra/docker_compose/docker-compose.yml logs frontend

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          for i in {1..60}; do 
            if curl -f http://localhost:4111/api/health 2>/dev/null; then
              echo "✓ Backend ready"
              break
            fi
            echo "Attempt $i/60..."
            sleep 2
          done
          
          echo "Waiting for frontend..."
          for i in {1..60}; do
            if curl -f http://localhost:3000 2>/dev/null; then
              echo "✓ Frontend ready"
              break
            fi
            echo "Attempt $i/60..."
            sleep 2
          done

      - name: Run tests
        env:
          SERVER: http://localhost:4111/api
          API_VERSION: /v1
          UI_BASE_URL: http://localhost:3000
          BASE_API_URL: http://localhost:4111
          BASE_UI_URL: http://localhost:3000
        run: make run-tests

      - uses: actions/checkout@v5
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history

      - run: |
          if [ -d "allure-history/.git" ]; then
            sudo rm -rf allure-history/.git
          fi
        if: always()

      - uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker_compose/docker-compose.yml down
