name: Run tests

on:
  push:
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      api_version:
        description: "Backend version tag (matches @pytest.mark.api_version(..))"
        required: true
        type: choice
        options:
          - with_database
          - with_fraud_check
      suite:
        description: "which suite to run "
        required: true
        type: choice
        options:
          - api
          - ui
          - api+ui
      markers:
        description: "additional pytest markers"
        required: false
        default: ""

jobs:
  run-tests:
    name: Setup services (review app) and run tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Start services
        run: |
          docker compose -f infra/docker_compose/docker-compose.yml up -d
          for i in {1..60}; do
            if curl -sf http://localhost:4111/actuator/health >/dev/null; then
              echo "Backend is UP"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:4111/actuator/health

      - name: Run Pytest
        env:
          SERVER: http://localhost:4111/api
          API_VERSION: /v1
          UI_BASE_URL: http://localhost:3000
        run: |
          set -eux

          API_VERSION_INPUT="${{ inputs.api_version }}"
          SUITE_INPUT="${{ inputs.suite }}"
          MARKERS="${{ inputs.markers }}"

          M_OPT=""

          if [ -n "$MARKERS" ]; then
            M_OPT="-m $MARKERS"
          fi

          if [ "$SUITE_INPUT" = "api" ]; then
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT -q
          elif [ "$SUITE_INPUT" = "ui" ]; then
            pytest -m ui $M_OPT -q
          else
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT -q
            pytest -m ui $M_OPT -q
          fi

      - name: Load test report history
        uses: actions/checkout@v5
        if: always()
        with:
          repository: ${{ github.repository }}
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Publish test reports
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker_compose/docker-compose.yml down -d
