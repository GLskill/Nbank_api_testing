name: Run tests

on: [push, workflow_dispatch]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    name: Setup services (review app) and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup playwright
        run: playwright install --with-deps

      - name: Run app
        run: make start-app

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -f http://localhost:4111/api/health 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          echo "Waiting for nginx (frontend proxy)..."
          for i in {1..30}; do
            if curl -f http://localhost:80 2>/dev/null; then
              echo "Nginx is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run tests
        env:
          BASE_API_URL: http://localhost:4111
          BASE_UI_URL: http://localhost:80
        run: make run-tests

      # ... остальные шаги без изменений