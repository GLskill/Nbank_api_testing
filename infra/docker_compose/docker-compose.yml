version: '3.8'

networks:
  nbank-network:
    name: nbank-network

services:
  backend:
    image: nobugsme/nbank:with_username_error_fix
    container_name: nbank-backend
    ports:
      - "4111:4111"
    networks:
      - nbank-network

  frontend:
    image: nobugsme/nbank-ui:latest
    container_name: nbank-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nbank-network
      -